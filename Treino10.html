<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação</title>
</head>
<body>
    <h1>Sistema de Votação</h1>
    <input type="text" name="txt1" id="txt1" placeholder="Digite a sua idade">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="res"></div>
    <script>
        function verificar (){
            var txt1 = document.getElementById("txt1")
            var res = document.getElementById("res")
            var idade = Number(txt1.value)
            if (idade >= 18){
                res.innerHTML = "Voce tem " + idade + " anos, portanto você é <strong>MAIOR DE IDADE</strong> e pode votar."
            } else {
                res.innerHTML = "Voce tem " + idade + " anos, portanto você é <strong> MENOR DE IDADE</strong> e não pode votar."
            }
        }
        

    </script>
</body>
</html>
