<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de idade 2</title>
</head>
<body>
   <input type="text" id="nome" placeholder="Digite seu Nome: ">
   <input type="number" id="nascimento" placeholder ="Digite o Ano em que Voce Nasceu: ">
    <button onclick ="calcular ()" >Calcular</button>

    <h2 id="Calcular "></h2>

    <script>
        function  calcular () {
        var nome = document.getElementById("nome").value
        var nascimento = document.getElementById("nascimento").value
        var idade = 2026 - nascimento
        document.getElementById("Calcular ").innerHTML= nome + " tem " + idade + " anos"   
        }
    </script>
</body>
</html>
